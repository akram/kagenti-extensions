# Poisoned email server. Returns 6 emails on GET /emails — the last one
# contains the prompt-injection payload that triggers the attack.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ibac-email-server
  namespace: ibac-demo
  labels:
    app.kubernetes.io/name: ibac-email-server
    app.kubernetes.io/part-of: ibac-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ibac-email-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ibac-email-server
    spec:
      containers:
        - name: email-server
          image: ibac-email-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
              name: http
          env:
            # The injection payload tells the agent to POST to this URL.
            - name: EXFIL_URL
              value: "http://ibac-evil-server.ibac-demo.svc.cluster.local:9999"
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 16Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ibac-email-server
  namespace: ibac-demo
spec:
  selector:
    app.kubernetes.io/name: ibac-email-server
  ports:
    - port: 8888
      targetPort: 8888
      protocol: TCP
  type: ClusterIP
